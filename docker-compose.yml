services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: personal_blog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/personal_blog?schema=public
      REDIS_URL: redis://redis:6379
      APP_URL: http://localhost:3000
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-replace-this-with-a-long-random-string}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      TRENDING_INTERVAL_SECONDS: ${TRENDING_INTERVAL_SECONDS:-21600}
    depends_on:
      - db
      - redis
    command: ["sh", "-c", "npm run db:push && npm run start"]
    expose:
      - "3000"
    volumes:
      - uploads-data:/app/public/uploads

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["sh", "-c", "npm run db:push && npm run worker"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/personal_blog?schema=public
      REDIS_URL: redis://redis:6379
      APP_URL: http://localhost:3000
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-replace-this-with-a-long-random-string}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      TRENDING_INTERVAL_SECONDS: ${TRENDING_INTERVAL_SECONDS:-21600}
    depends_on:
      - db
      - redis

  proxy:
    image: nginx:1.29-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "3000:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres-data:
  redis-data:
  uploads-data:
